# IMPORTANT: In Railway UI, set Root Directory to '/backend' in service Settings.

#Railway configuration for Medusa 1.20.11 Backend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm run build"

[deploy]
# init-backend runs DB migrations + seeds admin user on first start
startCommand = "pnpm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Optional: if you want to use Docker instead of Nixpacks, comment [build]
# section above and uncomment the line below:
# [build]
# builder = "DOCKERFILE"
# dockerfilePath = "Dockerfile"
